<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: white;
      text-align: center;
    }

    .container {
      background: rgba(0, 0, 0, 0.4);
      padding: 40px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      animation: fadeIn 1.5s ease;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 25px;
      background: #ffcc00;
      color: black;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ffaa00;
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #message {
      margin-top: 20px;
      font-size: 20px;
      display: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Welcome 👋</h1>
    <p>We're glad you're here!</p>

    <button onclick="showMessage()">Get Started</button>

    <div id="message">🚀 Let's begin your journey!</div>
  </div>

  <script>
    function showMessage() {
      const msg = document.getElementById("message");
      msg.style.display = "block";
    }
  </script>

</body>
</html>
